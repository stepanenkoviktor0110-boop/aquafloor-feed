name: Build feed

# Каноничный workflow для proxy-feed (все клиенты B24U).
#
# ВАЖНО: сгенерированный feed.xml в git НЕ коммитится. При Pages build_type=workflow
# раздаётся артефакт деплоя (upload-pages-artifact → deploy-pages), а НЕ файл из репо,
# поэтому коммитить результат сборки не нужно. Раньше шаг «Commit if changed» коммитил
# feed.xml и делал git pull --rebase — но feed.xml меняется каждый прогон (минимум строка
# date="..." в шапке YML), прогоны накладываются (cron+push+dispatch) → история расходится
# → "CONFLICT (content): Merge conflict in feed.xml" → rebase падает → build fail → письма
# владельцу. Коммит-шага здесь нет → этот класс падений исключён.
#
# Репозиторный feed.xml — только seed/last-known-good для фолбэка build-feed.mjs (когда
# источник недоступен, напр. RU-сайт геоблокирует IP GH-раннеров). Обновляется вручную
# локальной пересборкой с RU-IP, автокоммитами — никогда.
#
# Pages: build_type=workflow. Включить один раз:
#   gh api -X POST repos/<owner>/<repo>/pages -f build_type=workflow

on:
  schedule:
    - cron: '0 */6 * * *'   # каждые 6 часов
  workflow_dispatch:
  push:
    branches: [main]
    paths: [build-feed.mjs, package.json, package-lock.json, feed.xml, .github/workflows/build-feed.yml]

permissions:
  contents: read    # checkout
  pages: write      # deploy-pages
  id-token: write   # OIDC для deploy-pages

# Параллельные прогоны не накладываются; второй ждёт первый.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - run: npm install

      - name: Build feed
        env:
          # Публичный источник можно хардкодить дефолтом в build-feed.mjs и убрать строку.
          # Закрытый/с токеном — положить в Settings → Secrets and variables → Actions.
          SOURCE_FEED_URL: ${{ secrets.SOURCE_FEED_URL }}
        run: npm run build   # пишет public/feed.xml; при недоступности источника build-feed.mjs переиспользует репозиторный feed.xml (last-known-good)

      - name: Stage Pages artifact
        run: |
          mkdir -p _site
          cp public/feed.xml _site/feed.xml
          cp .nojekyll _site/.nojekyll 2>/dev/null || true
          cp README.md _site/README.md 2>/dev/null || true

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
